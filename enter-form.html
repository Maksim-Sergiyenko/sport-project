<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTZONE | Log In</title>
    <link rel="stylesheet" href="enter-form.css">
    <script src="registration.js" defer></script>
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>

    <div class="reg-wrapper">
        <form class="reg-form">
            <div class="logo">SPORT<span>ZONE</span></div>
            <h2>Log In</h2>
            
            <div class="input-group">
                <label for="nickname">Nickname</label>
                <input type="text" id="nickname" name="nickname" placeholder="Enter your nickname" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <button type="submit" class="btn-reg">Enter</button>

            <p class="login-link">Don't have an account? <a href="registration.html">Sing Up</a></p>
        </form>
    </div>

</body>
</html>
